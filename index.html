<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز تحميل الصور</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; color: #333; padding: 50px 20px; }
        .card { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #007bff; font-size: 24px; }
        p { color: #666; margin-bottom: 20px; }
        .download-btn { display: inline-block; padding: 12px 25px; font-size: 16px; color: #fff; background-color: #28a745; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .download-btn:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h1>خادم تحميل الصور الشخصي 📸</h1>
        <p>اضغط على الزر بالأسفل لتنزيل الصورة الحقيقية من ترمكس:</p>
        <a href="/pic.jpg" download="javascript_logo.jpg" class="download-btn">تنزيل الصورة الآن</a>
    </div>
</body>
</html>
